# Requires Docker Compose V2 (use "docker compose", not "docker-compose")

services:
  postgres:
    image: postgres:16
    container_name: shardveil-postgres
    environment:
      POSTGRES_USER: shardveil
      POSTGRES_PASSWORD: shardveil
      POSTGRES_DB: shardveil
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - shardveil_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shardveil -d shardveil"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - shardveil-network
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: shardveil-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - shardveil_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - shardveil-network
    restart: "no"

volumes:
  shardveil_postgres_data:
    name: shardveil_postgres_data
  shardveil_redis_data:
    name: shardveil_redis_data

networks:
  shardveil-network:
    name: shardveil-network
    driver: bridge
